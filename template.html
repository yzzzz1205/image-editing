<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>模板選擇</title>
  <link rel="icon" href="logo.PNG" type="image/PNG">
  <style>
    body {
      min-height: 100vh;
      font-family: '微軟正黑體', sans-serif;
      background: linear-gradient(135deg, #e3f2fd, #ffffff);
      padding: 30px 15px;
      text-align: center;
      margin: 0;
      box-sizing: border-box;
      position: relative;
    }

    h2 { font-size: 28px; margin-bottom: 25px; color: #333; }

    #canvasWrapper {
      display: block;
      margin: 0 auto 25px;
      position: relative;
      border-radius: 20px;
      background: white;
      box-shadow: 0 6px 18px rgb(98, 141, 206);
      overflow: hidden;
      max-width: 640px;
      box-sizing: border-box;
    }

    canvas { display: block; width: 100%; height: 100%; touch-action: none; }

    .templates { display: flex; justify-content: center; gap: 15px; margin-top: 10px; flex-wrap: wrap; }

    .templates button {
      padding: 10px 15px;
      border-radius: 20px;
      border: 2px solid #4da6e9;
      background: white;
      color: #4da6e9;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
    }

    .templates button.active { background: #4da6e9; color: white; }

    .brand-logo { position: absolute; top: 20px; left: 30px; display: flex; align-items: center; gap: 10px; z-index: 100; }
    .brand-logo img { width: 80px; height: 80px; object-fit: contain; }
    .brand-logo span { font-size: 25px; font-weight: bold; color: #2690ae; letter-spacing: 1px; }

    .action-btns { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 100; }
    .action-btns button { background: #4da6e9; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer; color: white; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); }

    @media (max-width: 768px) {
      .brand-logo { top: 15px; left: 15px; }
      .brand-logo img { width: 50px; height: 50px; }
      .brand-logo span { font-size: 20px; }
      .action-btns { top: 15px; right: 15px; }
    }
  </style>
</head>

<body>
  <div class="brand-logo">
    <img src="logo.PNG" alt="Logo" class="logo" />
    <span>修起來</span>
  </div>

  <h2>選擇模板</h2>

  <div class="action-btns">
    <button onclick="reset()">⟲</button>
    <button onclick="save()">✓</button>
  </div>

  <div id="canvasWrapper">
    <canvas id="canvas"></canvas>
  </div>

  <div class="templates">
    <button onclick="selectTemplate('film')">🎞️ 膠片樣式</button>
    <button onclick="selectTemplate('birthday')">🎂 生日快樂</button>
    <button onclick="selectTemplate('mirror')">🔁 翻轉對稱</button>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const buttons = document.querySelectorAll(".templates button");
    const canvasWrapper = document.getElementById("canvasWrapper");

    let baseImage = new Image();
    const images = JSON.parse(localStorage.getItem("collageImages")) || [];
    if (images.length !== 1) { alert("請先上傳一張圖片"); window.location.href = "upload.html"; }
    baseImage.src = images[0];

    let selectedTemplate = null;

    function setDisplaySize() {
      const ratio = baseImage.naturalWidth / baseImage.naturalHeight;
      let width = 640;
      let height = width / ratio;
      if (height > 480) { height = 480; width = height * ratio; }
      canvasWrapper.style.width = width + 'px';
      canvasWrapper.style.height = height + 'px';
    }

    baseImage.onload = () => {
      canvas.width = baseImage.naturalWidth;
      canvas.height = baseImage.naturalHeight;
      setDisplaySize();
      selectTemplate('film');
    };

    function drawTemplate() {
      canvas.width = baseImage.naturalWidth;
      canvas.height = baseImage.naturalHeight;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (!selectedTemplate) {
        ctx.drawImage(baseImage, 0, 0, canvas.width, canvas.height);
        return;
      }

      if (selectedTemplate === 'mirror') {
        const halfH = canvas.height / 2;
        ctx.drawImage(baseImage, 0, 0, canvas.width, halfH);
        ctx.save();
        ctx.translate(0, canvas.height);
        ctx.scale(1, -1);
        ctx.drawImage(baseImage, 0, 0, canvas.width, halfH);
        ctx.restore();
      } else if (selectedTemplate === "film") {
        ctx.drawImage(baseImage, 0, 0, canvas.width, canvas.height);
        
        // 畫上下膠捲邊條
        const barH = canvas.height * 0.1;
        ctx.fillStyle = "#1a1a1a";
        ctx.fillRect(0, 0, canvas.width, barH);
        ctx.fillRect(0, canvas.height - barH, canvas.width, barH);
        
        // 畫膠捲孔 (Sprocket holes)
        ctx.fillStyle = "#333";
        const holeW = canvas.width * 0.04;
        const holeH = barH * 0.5;
        for (let x = 20; x < canvas.width; x += holeW * 2) {
          // 圓角矩形邏輯
          ctx.beginPath();
          ctx.roundRect(x, barH * 0.25, holeW, holeH, 5);
          ctx.roundRect(x, canvas.height - barH + barH * 0.25, holeW, holeH, 5);
          ctx.fill();
        }
        
        // 攝影細節字樣
        ctx.fillStyle = "#555";
        ctx.font = `bold ${barH * 0.4}px Arial`;
        ctx.fillText("ISO 400  FILM-PRO", canvas.width * 0.05, barH * 0.7);
        ctx.fillText("00:26  EXP", canvas.width * 0.05, canvas.height - barH * 0.3);

      } else if (selectedTemplate === "birthday") {
        // 背景
        const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, "#fff0f5");
        grad.addColorStop(1, "#ffe4e1");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 隨機星星與彩帶
        ctx.globalAlpha = 0.5;
        const shapes = ['star', 'circle'];
        for(let i=0; i<50; i++) {
          ctx.fillStyle = i % 2 === 0 ? '#ff4081' : '#ffce44';
          const rx = Math.random() * canvas.width;
          const ry = Math.random() * canvas.height;
          ctx.beginPath();
          ctx.arc(rx, ry, Math.random() * 6 + 2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1.0;

        // 拍立得邊框
        const imgScale = (canvas.width * 0.7) / baseImage.naturalWidth;
        const imgW = baseImage.naturalWidth * imgScale;
        const imgH = baseImage.naturalHeight * imgScale;
        const x = (canvas.width - imgW) / 2;
        const y = (canvas.height - imgH) / 2;
        
        // 陰影
        ctx.shadowColor = "rgba(0,0,0,0.3)";
        ctx.shadowBlur = 20;
        ctx.fillStyle = "#ffffff";
        const padding = canvas.width * 0.04;
        ctx.fillRect(x - padding, y - padding, imgW + padding * 2, imgH + padding * 2 + padding * 3);
        ctx.shadowBlur = 0;
        
        // 紙膠帶效果 (用簡單矩形模擬)
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.fillRect(canvas.width / 2 - 40, y - padding - 15, 80, 30);
        
        ctx.drawImage(baseImage, x, y, imgW, imgH);
        
        // 文字
        ctx.fillStyle = "#d81b60";
        const fontSize = Math.floor(canvas.width * 0.08);
        ctx.font = `italic bold ${fontSize}px 'Microsoft JhengHei'`;
        ctx.textAlign = "center";
        ctx.fillText("Happy Birthday!", canvas.width / 2, y + imgH + padding * 2.5);
      }
    }

    function selectTemplate(name) {
      selectedTemplate = name;
      buttons.forEach(btn => btn.classList.remove("active"));
      const btn = Array.from(buttons).find(b => b.innerText.includes(name === 'film' ? '膠片' : name === 'birthday' ? '生日' : '翻轉'));
      if (btn) btn.classList.add("active");
      drawTemplate();
    }

    function reset() {
      selectedTemplate = null;
      buttons.forEach(btn => btn.classList.remove("active"));
      drawTemplate();
    }

    function save() {
      const result = canvas.toDataURL('image/jpeg', 0.9);
      localStorage.setItem("collageImages", JSON.stringify([result]));
      window.location.href = "editor.html";
    }
  </script>
</body>
</html>
